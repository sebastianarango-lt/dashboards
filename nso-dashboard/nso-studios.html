<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SWEAT440 — NSO Studios Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/style.css"/>
<style>
/* Summary-specific styles */
.summary-studio-select{margin-bottom:20px}
.summary-studio-select select{font-family:'Oswald',sans-serif;font-size:14px;padding:8px 16px;border-radius:8px;font-style:italic;text-transform:uppercase;letter-spacing:.5px}
.timeline-bar{position:relative;height:28px;background:#f0f6fa;border-radius:14px;overflow:visible;margin-bottom:8px}
.timeline-fill{height:100%;border-radius:14px;background:linear-gradient(90deg,var(--c-leads),var(--c-ft));transition:width .6s ease;position:relative;min-width:8px}
.timeline-marker{position:absolute;top:-6px;width:2px;height:40px;background:#1a1a2e;opacity:.3}
.timeline-marker-label{position:absolute;top:36px;font-size:9px;color:#5a7a8a;font-weight:600;white-space:nowrap;transform:translateX(-50%)}
.timeline-marker.co .timeline-marker-label{color:#f4a021;font-weight:700}
.timeline-marker.go .timeline-marker-label{color:#e05a5a;font-weight:700}
.timeline-current{position:absolute;top:-2px;right:-6px;width:12px;height:12px;border-radius:50%;background:var(--c-ft);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);z-index:2}
.timeline-weeks{display:flex;justify-content:space-between;font-size:9px;color:#8aaabb;margin-top:4px}
.summary-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.summary-card{padding:18px 20px}
.summary-card-section{font-family:'Oswald',sans-serif;font-style:italic;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;color:#5a7a8a;margin-bottom:14px}
.sk-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.sk-label{font-size:11px;color:#5a7a8a;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sk-vals{text-align:right}
.sk-actual{font-size:22px;font-weight:700;color:#1a1a2e;line-height:1}
.sk-goal{font-size:11px;color:#8aaabb;margin-top:2px}
.sk-check{color:#0a8a4a;font-weight:700;margin-left:4px}
.sk-miss{color:#d32f2f;font-weight:700;margin-left:4px}
.sk-progress{height:6px;background:#f0f6fa;border-radius:3px;margin-top:4px;overflow:hidden}
.sk-progress-fill{height:100%;border-radius:3px;transition:width .6s ease}
.open-countdown{display:flex;flex-direction:column;align-items:center;justify-content:center}
.open-days{font-family:'Oswald',sans-serif;font-size:48px;font-weight:700;color:var(--c-leads);line-height:1}
.open-label{font-family:'Oswald',sans-serif;font-style:italic;font-size:14px;font-weight:600;text-transform:uppercase;color:#e05a5a;letter-spacing:1px;margin-bottom:4px}
.open-date{font-size:11px;color:#5a7a8a}
@media(max-width:768px){.summary-kpis{grid-template-columns:1fr}}
.sc-table td:first-child,.sc-table th:first-child{position:sticky;left:0;background:#fff;z-index:1;border-right:1.5px solid #dde8ef}
.sc-table thead th:first-child{background:#f4f9fd}
.sc-cell-good{background:#e8faf0!important;color:#0a8a4a}
.sc-cell-warn{background:#fff8e1!important;color:#b8860b}
.sc-cell-bad{background:#ffeaea!important;color:#c0392b}
.sc-cell-cur{background:#e8f4fd!important}
/* Social posts table (Instagram / Facebook) */
.soc-table{width:100%;border-collapse:collapse;table-layout:fixed}
.soc-row{display:grid;gap:10px;padding:9px 12px;border-bottom:1px solid #edf3f7;align-items:center}
.soc-row:last-child{border-bottom:none}
.soc-row:not(.soc-th):hover{background:#f9fbfd}
.soc-row.soc-th{background:#f4f9fd;border-bottom:2px solid #dde8ef}
.soc-row.soc-ig{grid-template-columns:70px 68px 1fr 62px 55px 65px 65px}
.soc-row.soc-fb{grid-template-columns:70px 68px 1fr 65px 65px}
.soc-cell{font-size:12.5px;color:#5a7a8a;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.soc-cell:first-child,.soc-cell.soc-left{text-align:left;color:#1a4d6e}
.soc-row.soc-th .soc-cell:nth-child(3){text-align:left}
.soc-th .soc-cell{font-size:10px;font-weight:700;color:#8aaabb;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;user-select:none;font-family:'Oswald',sans-serif}
.soc-th .soc-cell:hover,.soc-th .soc-cell.sorted{color:var(--c-leads)}
.soc-cell.sc{color:var(--c-leads);font-weight:600}
.soc-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid #dde8ef;display:block}
.soc-thumb-ph{width:60px;height:60px;border-radius:8px;background:#f0f6fa;border:1px solid #dde8ef;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#8aaabb}
.soc-caption{font-size:12px;color:#1a4d6e;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.4;text-align:left}
.soc-caption a{color:#1a4d6e;text-decoration:none}.soc-caption a:hover{color:var(--c-leads);text-decoration:underline}
.soc-date{font-size:11px;color:#8aaabb;font-weight:600}
.soc-studio-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:.04em;margin-top:3px}
@media(max-width:640px){.soc-row.soc-ig{grid-template-columns:56px 56px 1fr 48px 48px}.soc-row.soc-ig .soc-cell:nth-child(n+6){display:none}.soc-row.soc-ig.soc-th .soc-cell:nth-child(n+6){display:none}.soc-row.soc-fb{grid-template-columns:56px 56px 1fr}.soc-row.soc-fb .soc-cell:nth-child(n+4){display:none}}
#leadsRingLeg,#memRingLeg{display:flex!important;flex-direction:column;gap:10px;font-size:13px;line-height:1.4;width:auto}
#leadsRingLeg .ring-legend-item,#memRingLeg .ring-legend-item{display:flex!important;align-items:center;gap:0;width:auto}
#leadsRingLeg .ring-legend-dot,#memRingLeg .ring-legend-dot{width:12px!important;height:12px!important;border-radius:3px;flex-shrink:0;margin-right:12px}
#leadsRingLeg .ring-legend-label,#memRingLeg .ring-legend-label{white-space:nowrap;color:#1a1a2e;margin-right:16px;flex:0 0 auto}
#leadsRingLeg .ring-legend-vol,#memRingLeg .ring-legend-vol{white-space:nowrap;text-align:right;color:#5a7a8a;margin-right:10px;flex:0 0 auto}
#leadsRingLeg .ring-legend-pct,#memRingLeg .ring-legend-pct{white-space:nowrap;text-align:right;font-weight:700;color:#1a1a2e;flex:0 0 auto}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><img src="../logo.png" alt="SWEAT440"/></div>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" onclick="switchTab('summary',this)">Summary</button>
    <button class="nav-tab" onclick="switchTab('scorecard',this)">Scorecard</button>
    <div class="nav-group">
      <button class="nav-tab nav-group-label" onclick="toggleNavGroup('funnel-group',this)">Funnel ▾</button>
      <div class="nav-submenu" id="funnel-group">
        <button class="nav-tab nav-sub" onclick="switchTab('funnel',this)">All Stages</button>
        <button class="nav-tab nav-sub" onclick="switchTab('leads',this)">Leads</button>
        <button class="nav-tab nav-sub" onclick="switchTab('members',this)">Sales</button>
      </div>
    </div>
    <button class="nav-tab" onclick="switchTab('meta',this)">Meta Ads</button>
    <button class="nav-tab" onclick="switchTab('facebook',this)">Facebook</button>
    <button class="nav-tab" onclick="switchTab('instagram',this)">Instagram</button>
    <button class="nav-tab" onclick="switchTab('google',this)">Google Ads</button>
    <button class="nav-tab" onclick="switchTab('ga4',this)">GA4</button>
    <button class="nav-tab" onclick="switchTab('gbp',this)">GBP</button>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
</nav>

<div class="controls-bar">
  <button class="controls-toggle" id="ctrlToggle" onclick="toggleControls()">Filters ▾</button>
  <div class="controls-inner" id="ctrlInner">
    <span class="ctrl-label">Studio</span>
    <div class="multi-select" id="studioDropdown">
      <button class="ms-trigger" onclick="_toggleDD('studio')"><span id="studioLabel">All NSO Studios</span><span class="ms-arrow">▾</span></button>
      <div class="ms-menu" id="studioMenu"></div>
    </div>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label">Source</span>
    <div class="multi-select" id="sourceDropdown">
      <button class="ms-trigger" onclick="_toggleDD('source')"><span id="sourceLabel">All Sources</span><span class="ms-arrow">▾</span></button>
      <div class="ms-menu" id="sourceMenu"></div>
    </div>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label">Date range</span>
    <div class="ctrl-date">
      <input type="date" id="fFrom" onchange="applyFilters()"/>
      <span style="font-size:12px;color:#5a7a8a">→</span>
      <input type="date" id="fTo" onchange="applyFilters()"/>
    </div>
  </div>
</div>

<div class="main">

  <!-- SUMMARY TAB -->
  <div class="tab-content active" id="tab-summary">
    <div class="summary-studio-select" style="display:none">
      <select id="summaryStudio" onchange="renderSummary()"></select>
    </div>
    <div id="summaryContent"></div>
  </div>

  <!-- SCORECARD TAB -->
  <div class="tab-content" id="tab-scorecard">
    <div id="scorecard-content"></div>
  </div>

  <!-- FUNNEL TAB -->
  <div class="tab-content" id="tab-funnel">
    <div class="chart-card"><div class="chart-card-title">Conversion Funnel — NSO Studios</div><div class="funnel-wrap" id="funnelBars"></div></div>
    <div class="chart-card"><div class="chart-card-title">Funnel Over Time</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div class="toggle-group" style="margin-bottom:0">
          <button class="tog-btn on" onclick="toggleDs(this,0)" style="border-color:#00A3E0;background:#00A3E0;color:#000"><span class="dot" style="background:#000"></span>Leads</button>
          <button class="tog-btn on" onclick="toggleDs(this,1)" style="border-color:#00FFC2;background:#00FFC2;color:#000"><span class="dot" style="background:#000"></span>Sales</button>

        </div>
        <div class="gran-group">
          <button class="gran-btn active" id="granDaily" onclick="setGran('daily')">Daily</button>
          <button class="gran-btn" id="granWeekly" onclick="setGran('weekly')">Weekly</button>
          <button class="gran-btn" id="granMonthly" onclick="setGran('monthly')">Monthly</button>
        </div>
      </div>
      <div style="position:relative;width:100%;height:260px"><canvas id="trendChart"></canvas></div>
    </div>
  </div>

  <!-- LEADS -->
  <div class="tab-content" id="tab-leads">
    <div id="leads-kpis" class="kpi-grid three"></div>
    <div class="chart-card"><div class="chart-card-title">Leads Over Time by Source</div>
      <div class="toggle-group" id="leads-toggles"></div>
      <div style="position:relative;width:100%;height:260px"><canvas id="leadsChart"></canvas></div>
    </div>
    <div class="chart-card"><div class="chart-card-title">Source Participation</div><div class="ring-wrap" style="flex-direction:row;align-items:center;justify-content:center;gap:56px;padding:24px 40px"><div class="ring-canvas-wrap" style="width:300px;height:300px;flex-shrink:0;margin:0"><canvas id="leadsRing"></canvas></div><div class="ring-legend" id="leadsRingLeg"></div></div></div>
  </div>

  <!-- META ADS -->
  <div class="tab-content" id="tab-meta">
    <div id="meta-content"></div>
  </div>

  <!-- FACEBOOK PAGE -->
  <div class="tab-content" id="tab-facebook">
    <div id="facebook-content"></div>
  </div>

  <!-- INSTAGRAM -->
  <div class="tab-content" id="tab-instagram">
    <div id="instagram-content"></div>
  </div>

  <!-- GOOGLE ADS -->
  <div class="tab-content" id="tab-google">
    <div id="google-content"></div>
  </div>

  <!-- GA4 -->
  <div class="tab-content" id="tab-ga4">
    <div id="ga4-content"></div>
  </div>

  <!-- GBP -->
  <div class="tab-content" id="tab-gbp">
    <div id="gbp-content"></div>
  </div>

  <!-- SALES -->
  <div class="tab-content" id="tab-members">
    <div id="mem-kpis" class="kpi-grid three"></div>
    <div class="chart-card"><div class="chart-card-title">Sales Over Time by Source</div>
      <div class="toggle-group" id="mem-toggles"></div>
      <div style="position:relative;width:100%;height:260px"><canvas id="memChart"></canvas></div>
    </div>
    <div class="chart-card"><div class="chart-card-title">Source Participation</div><div class="ring-wrap" style="flex-direction:row;align-items:center;justify-content:center;gap:56px;padding:24px 40px"><div class="ring-canvas-wrap" style="width:300px;height:300px;flex-shrink:0;margin:0"><canvas id="memRing"></canvas></div><div class="ring-legend" id="memRingLeg"></div></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="../shared/utils.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════════════════
   NSO STUDIOS DASHBOARD — Self-contained
   ══════════════════════════════════════════════════════════════════════════ */
const NSO=['SWEAT440 Dallas - Prestonwood','SWEAT440 Herriman','SWEAT440 Naples - Mercato','SWEAT440 Pinecrest - Palmetto Bay','SWEAT440 Reston'];
const EXCL_SRC=['ClassPass / Platforms','Grassroots','N/A'];

let RAW=null,SC=null,GRAN='daily',trendChart=null,NSO_SALES=null,NSO_SALES_ROWS=[],GBP_RAW=null;const _ch={};
let _sumView='cum',_sumStudio=null;
const TODAY=new Date(),fom=new Date(TODAY.getFullYear(),TODAY.getMonth(),1),lpm=new Date(fom.getTime()-864e5),fpm=new Date(lpm.getFullYear(),lpm.getMonth(),1);
function lds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
document.getElementById('fFrom').value=lds(fpm);document.getElementById('fTo').value=lds(lpm);

function toggleNav(){document.getElementById('navTabs').classList.toggle('open')}
function toggleControls(){const e=document.getElementById('ctrlInner');e.classList.toggle('open');document.getElementById('ctrlToggle').textContent=e.classList.contains('open')?'Filters ▴':'Filters ▾'}
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  if(btn&&btn.closest('.nav-submenu')){
    document.querySelectorAll('.nav-submenu').forEach(g=>g.classList.remove('open'));
    document.querySelectorAll('.nav-group-label').forEach(b=>b.classList.remove('group-open'));
    btn.closest('.nav-submenu').classList.add('open');
    btn.closest('.nav-group').querySelector('.nav-group-label').classList.add('group-open');
  }
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('navTabs').classList.remove('open');
  if(id==='summary')renderSummary();
  else if(id==='scorecard')renderScorecard();
  else if(id==='gbp')renderGBP();
  else if(id==='ga4')renderGA4();
  else if(id==='meta')renderMeta();
  else if(id==='google')renderGoogle();
  else if(id==='facebook')renderFacebook();
  else if(id==='instagram')renderInstagram();
  else applyFilters();
}
function toggleNavGroup(groupId,btn){
  const sub=document.getElementById(groupId);
  const isOpen=sub.classList.contains('open');
  document.querySelectorAll('.nav-submenu').forEach(s=>s.classList.remove('open'));
  document.querySelectorAll('.nav-group-label').forEach(b=>b.classList.remove('group-open'));
  if(!isOpen){sub.classList.add('open');btn.classList.add('group-open');}
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.nav-group')){
    document.querySelectorAll('.nav-submenu').forEach(s=>s.classList.remove('open'));
    document.querySelectorAll('.nav-group-label').forEach(b=>b.classList.remove('group-open'));
  }
});

/* Multi-select */
function _toggleDD(id){document.querySelectorAll('.ms-menu').forEach(m=>{if(m.id!==id+'Menu')m.classList.remove('open')});document.getElementById(id+'Menu').classList.toggle('open')}
document.addEventListener('click',e=>{if(!e.target.closest('.multi-select'))document.querySelectorAll('.ms-menu').forEach(m=>m.classList.remove('open'))});
function _buildMS(mid,lid,items,excl){const m=document.getElementById(mid);m.innerHTML='';const ad=document.createElement('div');ad.className='ms-item ms-select-all';ad.innerHTML=`<input type=checkbox id=${mid}_all> <label for=${mid}_all style=cursor:pointer>Select all</label>`;m.appendChild(ad);const sep=document.createElement('div');sep.className='ms-divider';m.appendChild(sep);items.forEach(it=>{const d=document.createElement('div');d.className='ms-item';const ch=!excl.includes(it);const si=`ms_${mid}_${it.replace(/[^a-z0-9]/gi,'_')}`;d.innerHTML=`<input type=checkbox id="${si}" value="${it}" ${ch?'checked':''}> <label for="${si}" style=cursor:pointer>${it}</label>`;d.querySelector('input').addEventListener('change',()=>{_syncA(mid);_updL(mid,lid,items);applyFilters()});m.appendChild(d)});const ac=document.getElementById(mid+'_all');_syncA(mid);ac.addEventListener('change',()=>{m.querySelectorAll('input[value]').forEach(c=>c.checked=ac.checked);_updL(mid,lid,items);applyFilters()});_updL(mid,lid,items)}
function _syncA(mid){const m=document.getElementById(mid);const all=[...m.querySelectorAll('input[value]')];const ac=document.getElementById(mid+'_all');const n=all.filter(c=>c.checked).length;ac.checked=n===all.length;ac.indeterminate=n>0&&n<all.length}
function _updL(mid,lid,items){const ch=[...document.getElementById(mid).querySelectorAll('input[value]:checked')].map(c=>c.value);const l=document.getElementById(lid);if(ch.length===0)l.textContent='None';else if(ch.length===items.length)l.textContent='All';else if(ch.length<=2)l.textContent=ch.map(s=>s.replace('SWEAT440 ','')).join(', ');else l.textContent=ch.length+' selected'}
function _getSel(mid){return[...document.getElementById(mid).querySelectorAll('input[value]:checked')].map(c=>c.value)}

/* Data helpers */
function grd(r){return new Date((r.date||r.month)+'T00:00:00Z')}
function fR(arr,f,t,st,sr){return arr.filter(r=>{const d=grd(r);if(f&&d<f)return false;if(t&&d>t)return false;if(st&&!st.includes(r.studio))return false;if(sr&&!sr.includes(r.source))return false;return true})}
function sR(rows){return rows.reduce((a,r)=>{a.leads+=r.signups||0;a.ft+=r.first_visits||0;a.mem+=r.first_sales||0;return a},{leads:0,ft:0,mem:0})}
function cW(f,t){const ms=t-f;const pp2=new Date(f.getTime()-864e5);const pp1=new Date(pp2.getTime()-ms);const py1=new Date(f);py1.setFullYear(py1.getFullYear()-1);const py2=new Date(t);py2.setFullYear(py2.getFullYear()-1);return{ppFrom:pp1,ppTo:pp2,pyFrom:py1,pyTo:py2}}
function cD(c,p){return p?(c-p)/p*100:null}
function fmD(d){return d.toLocaleString('en-US',{month:'short',year:'numeric'})}
function fmDay(iso){return new Date(iso+'T00:00:00Z').toLocaleString('en-US',{month:'short',day:'numeric',timeZone:'UTC'})}
function fmMo(iso){return new Date(iso+'T00:00:00Z').toLocaleString('en-US',{month:'short',year:'2-digit',timeZone:'UTC'})}
function toTS(d,m){const map={};if(GRAN==='daily'){d.forEach(r=>{if(!map[r.date])map[r.date]={key:r.date,label:fmDay(r.date),signups:0,first_visits:0,first_sales:0};map[r.date].signups+=r.signups||0;map[r.date].first_visits+=r.first_visits||0;map[r.date].first_sales+=r.first_sales||0})}else if(GRAN==='weekly'){[...d,...m].forEach(r=>{const dt=new Date((r.date||r.month)+'T00:00:00Z');const dy=dt.getUTCDay()||7;const ws=new Date(dt);ws.setUTCDate(dt.getUTCDate()-dy+1);const k=ws.toISOString().slice(0,10);if(!map[k])map[k]={key:k,label:fmDay(k),signups:0,first_visits:0,first_sales:0};map[k].signups+=r.signups||0;map[k].first_visits+=r.first_visits||0;map[k].first_sales+=r.first_sales||0})}else{[...d,...m].forEach(r=>{const k=(r.date||r.month).slice(0,7)+'-01';if(!map[k])map[k]={key:k,label:fmMo(k),signups:0,first_visits:0,first_sales:0};map[k].signups+=r.signups||0;map[k].first_visits+=r.first_visits||0;map[k].first_sales+=r.first_sales||0})}return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key))}
function toSrcTS(d,m){const map={};d.forEach(r=>{const mk=r.date+'|'+r.source;if(!map[mk])map[mk]={key:r.date,source:r.source,signups:0,first_visits:0,first_sales:0};map[mk].signups+=r.signups||0;map[mk].first_visits+=r.first_visits||0;map[mk].first_sales+=r.first_sales||0});return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key))}
function kpiCard(l,v,pp,py){const dpp=cD(v,pp),dpy=cD(v,py);const ppH=dpp!=null?`<div class="kpi-card-delta ${dpp>=0?'pos':'neg'}">${dpp>=0?'▲':'▼'} ${Math.abs(dpp).toFixed(1)}% prev period</div>`:'';const pyH=dpy!=null?`<div class="kpi-card-delta ${dpy>=0?'pos':'neg'}">${dpy>=0?'▲':'▼'} ${Math.abs(dpy).toFixed(1)}% prev year</div>`:'';return`<div class="kpi-card"><div class="kpi-card-label">${l}</div><div class="kpi-card-val">${v.toLocaleString()}</div>${ppH}${pyH}</div>`}

function setGran(g){GRAN=g;['daily','weekly','monthly'].forEach(x=>{const b=document.getElementById('gran'+x.charAt(0).toUpperCase()+x.slice(1));if(b)b.classList.toggle('active',x===g)});applyFilters()}
function toggleDs(btn,i){if(!trendChart)return;const ds=trendChart.data.datasets[i];ds.hidden=!ds.hidden;btn.classList.toggle('on');const cs=['#00A3E0','#00FFC2'];if(btn.classList.contains('on')){btn.style.background=cs[i];btn.style.borderColor=cs[i];btn.style.color='#000'}else{btn.style.background='#f4f9fd';btn.style.borderColor='#c0d4df';btn.style.color='#5a7a8a'}trendChart.update()}

function renderSummary(){
  if(!SC||!SC.studios||!SC.studios.length)return;
  const sel=document.getElementById('summaryStudio');
  const studio=SC.studios.find(s=>s.code===sel.value)||SC.studios[0];
  const w=studio.weeks,cw=studio.current_week,tgt=studio.targets;
  const cur=w[cw]||{};const prev=cw>0?w[cw-1]:{};
  const totalWeeks=studio.go_week||w.length-1;
  const pct=Math.min(100,Math.round(cw/totalWeeks*100));
  const weeksLeft=totalWeeks-cw;
  const presPct=tgt.presales_count?Math.min(100,Math.round((cur.presales_count||0)/tgt.presales_count*100)):0;

  let h='';

  // Full-width timeline bar
  const _fmtDate=iso=>iso?new Date(iso+'T00:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'UTC'}):'';
  const startDate=w[1]?w[1].date_start:null;
  const openWeekData=w[totalWeeks]||w[w.length-1]||{};
  const openDate=openWeekData.date_start||openWeekData.date_end||null;
  const curPct=Math.max(4,Math.min(96,pct)); // clamp so label never clips edges

  h+=`<div class="chart-card">`;
  h+=`<div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:18px">`;
  h+=`<div class="chart-card-title" style="margin-bottom:0">Presale Timeline — ${studio.name}</div>`;
  h+=`<div style="font-family:'Oswald',sans-serif;font-style:italic;font-size:12px;color:#5a7a8a;font-weight:500;text-transform:uppercase;letter-spacing:.5px"><span style="font-size:22px;font-weight:700;color:#e05a5a;font-family:'Oswald',sans-serif">${weeksLeft*7}</span>&nbsp;Days to Open</div>`;
  h+=`</div>`;
  h+=`<div style="display:flex;align-items:center;gap:16px">`;
  h+=`<div style="flex:1;min-width:0">`;
  h+=`<div class="timeline-bar"><div class="timeline-fill" style="width:${pct}%"><div class="timeline-current"></div></div>`;
  if(studio.co_week){const coPct=Math.round(studio.co_week/totalWeeks*100);h+=`<div class="timeline-marker co" style="left:${coPct}%"><div class="timeline-marker-label">C/O</div></div>`}
  h+=`</div>`;
  h+=`<div style="position:relative;height:34px;margin-top:6px">`;
  h+=`<div style="position:absolute;left:0;text-align:left"><div style="font-size:9px;color:#8aaabb;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Week 0</div>${startDate?`<div style="font-size:9px;color:#5a7a8a;margin-top:1px">${_fmtDate(startDate)}</div>`:''}</div>`;
  h+=`<div style="position:absolute;left:${curPct}%;transform:translateX(-50%);text-align:center;white-space:nowrap"><div style="font-size:9px;color:#00C9A7;font-weight:700;text-transform:uppercase;letter-spacing:.5px">W${cw} — Current</div></div>`;
  h+=`</div></div>`;
  h+=`<div style="text-align:right;white-space:nowrap;flex-shrink:0"><div style="font-size:9px;color:#8aaabb;font-weight:600;text-transform:uppercase;letter-spacing:.5px">W${totalWeeks}</div><div style="font-size:9px;color:#e05a5a;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px">Opening Date</div>${openDate?`<div style="font-size:13px;font-weight:700;color:#1a1a2e;font-family:'Oswald',sans-serif;margin-top:2px">${_fmtDate(openDate)}</div>`:''}</div>`;
  h+=`</div></div>`;

  // Progress bar helper for Total to Date
  function _progBar(label,actual,target,color,benchVal,benchLabel){
    const t=typeof target==='number'&&target>0?target:1;
    const fillPct=Math.min(100,Math.round(Math.max(0,actual)/t*100));
    const benchPct=benchVal!=null?Math.min(100,Math.round(Math.max(0,benchVal)/t*100)):null;
    let b=`<div style="margin-bottom:18px">`;
    b+=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">`;
    b+=`<div style="font-size:11px;color:#5a7a8a;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${label}</div>`;
    b+=`<div style="text-align:right"><span style="font-size:20px;font-weight:700;color:#1a1a2e;font-family:'Oswald',sans-serif">${typeof actual==='number'?actual.toLocaleString():actual}</span><span style="font-size:10px;color:#8aaabb;margin-left:6px">/ ${typeof target==='number'?target.toLocaleString():target}</span></div>`;
    b+=`</div>`;
    b+=`<div style="position:relative;height:14px;background:#f0f6fa;border-radius:7px;overflow:visible">`;
    b+=`<div style="position:absolute;left:0;top:0;height:100%;width:${fillPct}%;background:${color};border-radius:7px;min-width:${fillPct>0?4:0}px"></div>`;
    if(benchPct!==null){
      b+=`<div style="position:absolute;top:-4px;left:${benchPct}%;width:2px;height:22px;background:#f4a021;border-radius:1px;transform:translateX(-50%);z-index:2">`;
      b+=`<div style="position:absolute;top:100%;left:50%;transform:translateX(-50%);font-size:8px;color:#f4a021;font-weight:700;white-space:nowrap;margin-top:3px">${benchLabel}</div>`;
      b+=`</div>`;
    }
    b+=`</div></div>`;
    return b;
  }

  // Last Week data
  const lastLeads=(cur.total_leads||0)-(prev.total_leads||0);
  const lastPresales=(cur.presales_count||0)-(prev.presales_count||0);
  const lastSpend=(cur.total_marketing_spend||0)-(prev.total_marketing_spend||0);
  const wkLeadGoal=tgt.total_leads?Math.round(tgt.total_leads/totalWeeks):0;
  const wkPresaleGoal=tgt.presales_count?Math.round(tgt.presales_count/totalWeeks):0;
  const estTotalSpend=cw>0?Math.round((cur.total_marketing_spend||0)/cw*totalWeeks):0;

  // Pacing benchmarks (300-in-12wk and 440-in-16wk) at current week
  const pace300=Math.round(300/12*cw);
  const pace440=Math.round(440/16*cw);

  h+=`<div class="two-col" style="margin-bottom:20px">`;

  // Card A — Last Week
  h+=`<div class="chart-card summary-card"><div class="summary-card-section">Last Week (W${cw})</div>`;
  h+=skRow('Leads',lastLeads,wkLeadGoal,'#00A3E0',true);
  h+=skRow('Presales',lastPresales,wkPresaleGoal,'#00C9A7',true);
  if(cur.blended_cpl)h+=skValRow('CPL','$'+cur.blended_cpl.toFixed(0),tgt.blended_cpl);
  if(cur.blended_cpa)h+=skValRow('CPA','$'+cur.blended_cpa.toFixed(0),tgt.blended_cpa);
  // Marketing Spend row with Est. Total sub-label
  h+=`<div class="sk-row" style="margin-top:8px"><div><div class="sk-label">Mktg Spend</div></div><div class="sk-vals"><div class="sk-actual" style="font-size:18px">${lastSpend>0?'$'+lastSpend.toLocaleString():'—'}</div>${estTotalSpend>0?`<div class="sk-goal">Est. Total: $${estTotalSpend.toLocaleString()}</div>`:''}</div></div>`;
  h+=`</div>`;

  // Card B — Total to Date with progress bars
  h+=`<div class="chart-card summary-card"><div class="summary-card-section">Total to Date</div>`;
  h+=_progBar('Leads',cur.total_leads||0,tgt.total_leads||0,'#00A3E0',Math.round((tgt.total_leads||0)/totalWeeks*cw),'Weekly Pace');
  h+=_progBar('Presales',cur.presales_count||0,tgt.presales_count||0,'#00C9A7',pace300,'300 in 12wk');
  if((cur.estimated_day1_rmr||0)>0){const _rmrA=cur.estimated_day1_rmr||0,_rmrT=tgt.estimated_day1_rmr||0,_rmrPct=_rmrT>0?Math.min(100,Math.round(_rmrA/_rmrT*100)):0;h+=`<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px"><div style="font-size:11px;color:#5a7a8a;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Est. Day-1 RMR</div><div style="text-align:right"><span style="font-size:20px;font-weight:700;color:#1a1a2e;font-family:'Oswald',sans-serif">$${_rmrA.toLocaleString()}</span><span style="font-size:10px;color:#8aaabb;margin-left:6px">/ $${_rmrT.toLocaleString()}</span></div></div><div style="position:relative;height:14px;background:#f0f6fa;border-radius:7px"><div style="position:absolute;left:0;top:0;height:100%;width:${_rmrPct}%;background:#f4a021;border-radius:7px;min-width:${_rmrPct>0?4:0}px"></div></div></div>`;}
  h+=`<div class="sk-row" style="margin-top:4px"><div class="sk-label">Mktg Spend</div><div class="sk-vals"><div class="sk-actual" style="font-size:18px">$${(cur.total_marketing_spend||0).toLocaleString()}</div></div></div>`;
  h+=`</div>`;

  h+=`</div>`;

  // Charts
  _sumStudio=studio;_sumView='cum';
  h+=`<div class="chart-card"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px"><div class="chart-card-title" style="margin-bottom:0">Presales</div><div class="gran-group"><button class="gran-btn active" id="sumCumBtn" onclick="setSumView('cum')">Cumulative</button><button class="gran-btn" id="sumWeekBtn" onclick="setSumView('weekly')">Weekly</button></div></div><div style="position:relative;width:100%;height:300px"><canvas id="sumChartCanvas"></canvas></div></div>`;
  h+=`<div class="chart-card"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px"><div class="chart-card-title" style="margin-bottom:0">Leads</div><div class="gran-group"><button class="gran-btn active" id="sumLeadsCumBtn" onclick="setSumView('cum')">Cumulative</button><button class="gran-btn" id="sumLeadsWeekBtn" onclick="setSumView('weekly')">Weekly</button></div></div><div style="position:relative;width:100%;height:300px"><canvas id="sumLeadsCanvas"></canvas></div></div>`;

  document.getElementById('summaryContent').innerHTML=h;
  setTimeout(()=>{drawCumChart(studio);drawCumLeadsChart(studio)},50);
}

function skRow(label,actual,goal,color,noCheck){
  const numActual=typeof actual==='string'?actual:actual.toLocaleString();
  const numGoal=goal!=null?(typeof goal==='string'?goal:goal.toLocaleString()):null;
  const met=!noCheck&&typeof actual==='number'&&typeof goal==='number'&&actual>=goal;
  const miss=!noCheck&&typeof actual==='number'&&typeof goal==='number'&&actual<goal;
  let h=`<div class="sk-row"><div><div class="sk-label">${label}</div></div><div class="sk-vals"><div class="sk-actual">${numActual}`;
  if(met)h+=`<span class="sk-check">✓</span>`;
  h+=`</div>`;
  if(numGoal!=null)h+=`<div class="sk-goal">Goal: ${numGoal}</div>`;
  h+=`</div></div>`;
  if(typeof actual==='number'&&typeof goal==='number'&&goal>0){
    const p=Math.min(100,Math.round(actual/goal*100));
    h+=`<div class="sk-progress"><div class="sk-progress-fill" style="width:${p}%;background:${color}"></div></div>`;
  }
  return h;
}

function skValRow(label,actual,benchmark){
  const bStr=typeof benchmark==='string'?benchmark:(benchmark!=null?'$'+benchmark:'');
  return`<div class="sk-row" style="margin-top:8px"><div class="sk-label">${label}</div><div class="sk-vals"><div class="sk-actual" style="font-size:18px">${actual}</div>${bStr?`<div class="sk-goal">Target: ${bStr}</div>`:''}</div></div>`;
}

/* Parse "M/D - M/D" or "Label M/D - M/D" date strings → {start,end} YYYY-MM-DD */
function _parseWkDates(s){
  const m=[...s.matchAll(/(\d{1,2})\/(\d{1,2})/g)];
  if(m.length<2)return null;
  const fmt=(mo,dy)=>`2026-${String(mo).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
  // Use last two matches so label-embedded dates (e.g. "Move to $129 on 3/3 3/2 - 3/8") don't shift the range
  const s0=m[m.length-2],s1=m[m.length-1];
  return{start:fmt(s0[1],s0[2]),end:fmt(s1[1],s1[2])};
}

/* Aggregate data.json rows for a studio within a date range */
function _wkData(studioFull,dateStart,dateEnd){
  if(!RAW||!dateStart)return null;
  const rows=(RAW.daily_detail||[]).filter(r=>
    r.studio===studioFull && r.date>=dateStart && r.date<=dateEnd);
  if(!rows.length)return null;
  const nl=rows.reduce((a,r)=>a+(r.signups||0),0);
  const np=rows.reduce((a,r)=>a+(r.first_sales||0),0);
  const gl=rows.filter(r=>r.source==='Grassroots').reduce((a,r)=>a+(r.signups||0),0);
  return{nl,np,cr:nl>0?np/nl:null,gl};
}

function scKpi(label,val,target,fmt,targetLabel,auto){
  const fv=val!=null?fmt(val):'—';
  const pct=target&&val!=null?Math.min(100,Math.round(val/target*100)):null;
  const tl=targetLabel||(target!=null?fmt(target):null);
  const bar=pct!=null?`<div style="height:4px;background:#f0f6fa;border-radius:2px;margin-top:8px"><div style="height:100%;width:${pct}%;background:${pct>=100?'#0a8a4a':pct>=70?'#f4a021':'#e05a5a'};border-radius:2px"></div></div>`:'';
  const badge=auto?`<span style="font-size:9px;background:#e8f4fd;color:#0077bb;border-radius:3px;padding:1px 5px;margin-left:4px;font-family:Oswald,sans-serif;letter-spacing:.03em">AUTO</span>`:'';
  return`<div class="kpi-card"><div class="kpi-card-label">${label}${badge}</div><div class="kpi-card-val">${fv}</div>${tl?`<div style="font-size:11px;color:#8aaabb;margin-top:2px">Target: ${tl}</div>`:''} ${bar}</div>`;
}

function renderScorecard(){
  const el=document.getElementById('scorecard-content');if(!el)return;
  if(!SC||!SC.studios||!SC.studios.length){
    el.innerHTML='<div style="padding:40px;text-align:center;color:#8aaabb;font-family:Oswald,sans-serif;font-style:italic">Scorecard data not available.</div>';
    return;
  }

  // Use global studio filter — pick first selected studio that has scorecard data
  const selStudios=_getSel('studioMenu');
  const sc=(selStudios.length?SC.studios.find(s=>selStudios.includes(s.full_name)):null)||SC.studios[0];

  const studioFull=sc.full_name;
  const cw=sc.current_week||0;
  const tgt=sc.targets||{};

  // Build week list using date_start/date_end ISO fields from JSON
  const weeks=sc.weeks.map((w,i)=>{
    const wn=parseInt(String(w.week).replace(/[^0-9]/g,''))||0;
    const ds=w.date_start||null, de=w.date_end||null;
    const auto=(ds&&de)?_wkData(studioFull,ds,de):null;
    const prevW=i>0?sc.weeks[i-1]:null;
    const scNl=auto?auto.nl:((w.total_leads||0)-(prevW?prevW.total_leads||0:0));
    const scNp=auto?auto.np:((w.presales_count||0)-(prevW?prevW.presales_count||0:0));
    const np_val = w.presales_week??( auto?auto.np:Math.max(0,scNp) );
    const nl_val = auto?auto.nl:Math.max(0,scNl);
    return{
      w:wn, date:w.date_range||'', isCur:wn===cw,
      // auto-filled from data.json when available
      nl:nl_val,
      np:np_val,
      cr:nl_val>0?np_val/nl_val:null,
      gl:auto?auto.gl:null,
      // from scorecard JSON (MART_SALES_DETAILS)
      tl:w.total_leads||0,
      pc:w.presales_count||0,
      canc:w.cancellations_week??null,
      rmr:w.estimated_day1_rmr||0,
      ts:w.total_marketing_spend||0,
      cpl:w.blended_cpl||null,
      cpa:w.blended_cpa||null,
      ig:w.ig_new_followers??null,
      // manual only — not in any data source yet
      ev:null, gp:null,
      hasAuto:!!auto,
      ds:ds, de:de,
    };
  }).filter(w=>w.w<=cw+1);  // only show past + 1 future week

  const cur=weeks.find(w=>w.w===cw)||weeks[weeks.length-1]||{};

  let h='';

  // Weekly KPI table definitions
  const reqLeads=tgt.total_leads&&sc.go_week?+(tgt.total_leads/sc.go_week).toFixed(1):null;
  const reqPresales=tgt.presales_count&&sc.go_week?+(tgt.presales_count/sc.go_week).toFixed(1):null;
  const wkDefs=[
    {label:'New Leads',     src:'auto', req:reqLeads,  key:'nl', fmt:v=>v!=null?v:'—',color:true},
    {label:'New Presales',  src:'auto', req:reqPresales,key:'np', fmt:v=>v!=null?v:'—',color:true},
    {label:'Conversion Rate',src:'auto',req:.35,       key:'cr', fmt:v=>v!=null?(v*100).toFixed(1)+'%':'—',color:false},
    {label:'Grassroots Leads',src:'auto',req:40,       key:'gl', fmt:v=>v!=null?v:'—',color:true},
    {label:'Total Leads (cum.)',src:'sc',  req:null,    key:'tl', fmt:v=>v||'—',color:false},
    {label:'Presales (cum.)',   src:'sc', req:null,    key:'pc', fmt:v=>v||'—',color:false},
    {label:'Mktg Spend',   src:'sc',   req:null,      key:'ts', fmt:v=>v?'$'+Math.round(v).toLocaleString():'—',color:false},
    {label:'Blended CPL',  src:'sc',   req:null,      key:'cpl',fmt:v=>v!=null?(typeof v==='number'?'$'+v.toFixed(2):v):'—',color:false},
    {label:'Est. RMR',     src:'sc',   req:null,      key:'rmr',fmt:v=>v?'$'+Math.round(v).toLocaleString():'—',color:false},
    {label:'Cancellations',src:'sc',     req:null,    key:'canc',fmt:v=>v!=null?v:'—',color:false},
    {label:'Comm. Events', src:'missing',req:6,       key:'ev', fmt:v=>v!=null?v:'—',color:true},
    {label:'Grs. Presales',src:'missing',req:20,      key:'gp', fmt:v=>v!=null?v:'—',color:true},
    {label:'IG New Followers',src:'sc',     req:30,   key:'ig', fmt:v=>v!=null?v:'—',color:true},
  ];

  const srcStyle={
    auto:'background:#f0f8ff;color:#0077bb',
    sc:'background:#f8f8f0;color:#7a6500',
    missing:'background:#f8f8f8;color:#b0b8c0'
  };
  const srcIcon={auto:'🔄',sc:'📋',missing:'—'};

  h+=`<div class="chart-card" style="padding:20px 24px"><div class="chart-card-title" style="font-size:16px">Weekly KPIs — ${sc.full_name.replace('SWEAT440 ','')} <span style="font-size:13px;color:#8aaabb;font-weight:400">(W${cw} current)</span></div><div style="overflow-x:auto"><table class="data-table sc-table" style="font-size:13px"><thead><tr>`;
  h+=`<th style="min-width:200px;font-size:13px">KPI</th><th style="min-width:48px;text-align:center">Src</th>`;
  h+=`<th class="num" style="background:#f8f4ec;color:#b8860b;min-width:70px">Req/Wk</th>`;
  const pastWeeks=weeks.filter(w=>w.w>0);
  function _fmtD(iso){if(!iso)return'?';const[y,m,d]=iso.split('-');return`${+m}/${+d}`+(y!=='2026'?`<br><span style="font-size:8px;color:#c07000">${y}</span>`:'')}
  pastWeeks.forEach(wk=>{
    const dateSpan=wk.ds?`<span style="font-size:9px;font-weight:400;color:#5a7a8a;white-space:nowrap">${_fmtD(wk.ds)}</span><br><span style="font-size:9px;font-weight:400;color:#5a7a8a;white-space:nowrap">${_fmtD(wk.de)}</span>`:`<span style="font-size:9px;font-weight:400;color:#8aaabb">${(wk.date||'').slice(0,9)}</span>`;
    h+=`<th class="num${wk.isCur?' sc-cell-cur':''}" style="min-width:90px;font-size:13px">W${wk.w}<br>${dateSpan}${wk.hasAuto?'<br><span style="font-size:9px;color:#0077bb">●</span>':''}</th>`;
  });
  h+=`</tr></thead><tbody>`;

  wkDefs.forEach(row=>{
    const ss=srcStyle[row.src];
    h+=`<tr><td style="font-size:13px;font-weight:600">${row.label}</td>`;
    h+=`<td style="text-align:center;font-size:14px" title="${row.src}">${srcIcon[row.src]}</td>`;
    h+=`<td class="num" style="background:#f8f4ec;color:#b8860b;font-size:13px">${row.req!=null?row.req:'n/a'}</td>`;
    pastWeeks.forEach(wk=>{

      }
      const style=row.src==='missing'&&val==null?'color:#d0d8e0':'';
      h+=`<td class="num ${cls}" style="font-size:13px;${style}">${row.fmt(val)}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;

  el.innerHTML=h;
}

let META_RAW=null;
const META_CODES={
  'SWEAT440 Herriman':'UT-001',
  'SWEAT440 Dallas - Prestonwood':'TX-003',
  'SWEAT440 Naples - Mercato':'FL-019',
  'SWEAT440 Pinecrest - Palmetto Bay':'FL-017',
  'SWEAT440 Reston':'VA-001'
};

function metaFilter(studio,from,to){
  if(!META_RAW)return[];
  const code=META_CODES[studio];
  if(!code)return[];
  return META_RAW.filter(r=>{
    if(!r.campaign_name.includes(code))return false;
    if(from&&r.date<from)return false;
    if(to&&r.date>to)return false;
    return true;
  });
}

function renderMeta(){

  const allRows=activeStudios.flatMap(s=>metaFilter(s,from,to));
  const totalSpend=allRows.reduce((s,r)=>s+(r.spend||0),0);

function ga4Filter(studio,from,to){
  if(!GA4_RAW)return[];
  const paths=GA4_PATHS[studio]||[];
  return GA4_RAW.filter(r=>{
    if(!paths.some(p=>r.landing_page.startsWith(p)))return false;
    if(from&&r.date<from)return false;
    if(to&&r.date>to)return false;
    return true;
  });
}

function _socialStudios(key){
  const sel=_getSel('studioMenu');
  const data=(SOCIAL_RAW&&SOCIAL_RAW[key])||[];
  // Match by studio code: 'SWEAT440 Herriman' → 'UT-001'
  const CODE_MAP={
    'SWEAT440 Herriman':'UT-001','SWEAT440 Dallas - Prestonwood':'TX-003',
    'SWEAT440 Naples - Mercato':'FL-019','SWEAT440 Pinecrest - Palmetto Bay':'FL-017',
    'SWEAT440 Reston':'VA-001'
  };
  const activeCodes=sel.map(s=>CODE_MAP[s]).filter(Boolean);
  return data.filter(s=>activeCodes.includes(s.code));
}

const _C2S={'UT-001':'SWEAT440 Herriman','TX-003':'SWEAT440 Dallas - Prestonwood','FL-019':'SWEAT440 Naples - Mercato','FL-017':'SWEAT440 Pinecrest - Palmetto Bay','VA-001':'SWEAT440 Reston'};
const _SOC_SORTS={fb:{col:-1,dir:'desc'},ig:{col:-1,dir:'desc'}};

function _socSortHdr(text,key,colIdx,sortable=true){
  if(!sortable)return`<div class="soc-cell">${text}</div>`;
  const st=_SOC_SORTS[key];const sorted=st.col===colIdx;
  const arr=sorted?(st.dir==='desc'?' ▼':' ▲'):'';
  return`<div class="soc-cell${sorted?' sorted':''}" onclick="_socSort('${key}',${colIdx})">${text}${arr}</div>`;
}
function _socSort(key,colIdx){
  const st=_SOC_SORTS[key];
  if(st.col===colIdx)st.dir=st.dir==='desc'?'asc':'desc';else{st.col=colIdx;st.dir='desc';}
  if(key==='fb')renderFacebook();else renderInstagram();
}
function _scCls(key,col){return _SOC_SORTS[key].col===col?'sc':'';}

    function _normStudio(arr){return arr.map(r=>_nsoShort.includes(r.studio)?{...r,studio:'SWEAT440 '+r.studio}:r)}
    RAW.daily_detail=_normStudio(RAW.daily_detail);RAW.monthly_detail=_normStudio(RAW.monthly_detail);}
  else{console.error('data.json failed');RAW={daily_detail:[],monthly_detail:[],sources:[],studios:[]}}

  if(scRes.status==='fulfilled'){SC=scRes.value}
  else{console.warn('nso_scorecard_data.json not found');SC={studios:[]};document.getElementById('summaryContent').innerHTML='<div style="padding:40px;text-align:center;color:#8aaabb;font-family:Oswald,sans-serif;font-style:italic">Scorecard data not yet available for NSO studios.</div>'}

  if(mktRes.status==='fulfilled'){GA4_RAW=mktRes.value.ga4_traffic||[];META_RAW=mktRes.value.meta_ads||[]}

  if(gadsRes.status==='fulfilled'){GOOGLE_RAW=gadsRes.value.google_ads||[]}
  else{console.warn('nso_google_ads.json not found');GOOGLE_RAW=[]}

  if(socialRes.status==='fulfilled'){SOCIAL_RAW=socialRes.value}
  else{console.warn('social_insights.json not found');SOCIAL_RAW={facebook:[],instagram:[]}}

  if(salesRes.status==='fulfilled'){
    NSO_SALES=salesRes.value;
    NSO_SALES_ROWS=[];
    Object.values(NSO_SALES.studios||{}).forEach(s=>{
      (s.daily||[]).forEach(r=>{
        NSO_SALES_ROWS.push({date:r.date,studio:s.name,source:r.source||'Unknown',first_sales:r.presales||0,cancellations:r.cancellations||0,gross_revenue:r.gross_revenue||0});
      });

  }else{console.warn('nso_sales_data.json not found');NSO_SALES=null;NSO_SALES_ROWS=[]}

  if(gbpRes.status==='fulfilled'){GBP_RAW=gbpRes.value}
  else{console.warn('gbp_data.json not found');GBP_RAW=null}

  // Build multi-selects
  _buildMS('studioMenu','studioLabel',NSO,[]);
  const _allSrc=[...new Set([...(RAW.sources||[]),...NSO_SALES_ROWS.map(r=>r.source)])].filter(Boolean).sort();
  _buildMS('sourceMenu','sourceLabel',_allSrc,EXCL_SRC);

  // Populate summary studio dropdown
  const sel=document.getElementById('summaryStudio');
  sel.innerHTML=(SC.studios||[]).filter(s=>!s.name.toLowerCase().includes('naples')).map(s=>`<option value="${s.code}">${s.name}</option>`).join('');
  if(!sel.options.length)sel.innerHTML='<option>No scorecard data</option>';

  // Fallback dates
  const nsoRows=[...(RAW.daily_detail||[]),...(RAW.monthly_detail||[])].filter(r=>NSO.includes(r.studio));
  const allKeys=nsoRows.map(r=>r.date||r.month).filter(Boolean).sort();
  if(allKeys.length){const lk=allKeys[allKeys.length-1].slice(0,7);const df=document.getElementById('fFrom').value.slice(0,7);const has=allKeys.some(k=>k>=df+'-01'&&k<=df+'-31');if(!has){const ld=new Date(lk+'-01T00:00:00Z');document.getElementById('fFrom').value=new Date(Date.UTC(ld.getUTCFullYear(),ld.getUTCMonth(),1)).toISOString().slice(0,10);document.getElementById('fTo').value=new Date(Date.UTC(ld.getUTCFullYear(),ld.getUTCMonth()+1,0)).toISOString().slice(0,10)}}

  renderSummary();
  applyFilters();
}
init();
</script>
</body>
