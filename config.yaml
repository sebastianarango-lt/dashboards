  # =================================================================
  win_a_free_month_apr2026:
    display_name: "Win a Free Month"
    period_label: "Apr 1-14, 2026"
    date_start:   "2026-04-01"
    date_end:     "2026-04-14"
    ad_account_id: "act_1553887681409034"   # SWEAT440 - Corporate Studios
    campaign_id:   "120243785513570249"     # 2026 - Open Studios - Win a Free Month

