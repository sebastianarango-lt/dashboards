# ---------------------------------------------------------------------
# SWEAT440 Paid Ads Dashboard -- Campaign config
# ---------------------------------------------------------------------
# Como funciona:
#   - 'active_campaign' apunta a UN bloque dentro de 'campaigns:'.
#   - Puedes tener tantos bloques como campanas quieras trackear.
#   - Para cambiar de campana: edita 'active_campaign' y relanza
#     el ETL (python backend/meta_to_sheets.py). No se toca codigo.
# ---------------------------------------------------------------------

active_campaign: win_a_free_month_apr2026

# 'campaigns_to_track' son TODAS las campanas que el ETL va a extraer en
# cada run, para que aparezcan en el dropdown del dashboard.
# Anade o quita nombres aqui segun necesites.
campaigns_to_track:
  - win_a_free_month_apr2026
  - free_class_open_studios_2026
  - buy_1_get_3_open_studios_2026


campaigns:

